# GPS SHM + PPS (microsecond accuracy)
# Generated by gps-dashboard ntp_setup.py — GPS+PPS mode
# Requires: pps-gpio kernel module, gpsd with PPS device configured

# NMEA coarse time — used for initial lock only, not for selection
refclock SHM 0 refid GPS precision 1e-1 offset 0.0 delay 0.2 noselect

# PPS precise timing — preferred source once GPS coarse lock is acquired
refclock SHM 1 refid PPS precision 1e-7 prefer

# Internet fallback pools (used when online)
pool 2.debian.pool.ntp.org iburst

# Serve time to LAN clients
allow 192.168.0.0/16

local stratum 1

driftfile /var/lib/chrony/drift
makestep 1.0 3
rtcsync
logdir /var/log/chrony
