# GPS SHM source only (no PPS — ~100ms accuracy)
# Generated by gps-dashboard ntp_setup.py — GPS-only mode

refclock SHM 0 refid GPS precision 1e-1 offset 0.0 delay 0.2

# Internet fallback pools (used when online)
pool 2.debian.pool.ntp.org iburst

# Serve time to LAN clients
allow 192.168.0.0/16

# Advertise even when not synced so LAN clients don't lose NTP
local stratum 10

driftfile /var/lib/chrony/drift
makestep 1.0 3
rtcsync
logdir /var/log/chrony
